<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doki Doki World | Detalles del Producto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=200;300;400;500&family=Playfair+Display:ital,wght=0,400;1,400&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dokiBackground: '#FBF9FC', dokiDark: '#111111', dokiRosa: '#E55B92', dokiLila: '#934B8B' },
          fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-dokiBackground text-dokiDark antialiased min-h-screen flex flex-col overflow-x-hidden">

  <!-- NAVBAR -->
  <nav class="w-full bg-dokiBackground/80 backdrop-blur-md sticky top-0 z-40 border-b border-neutral-100">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="index.html" class="text-xs tracking-widest uppercase font-light hover:text-dokiRosa transition">← Volver al inicio</a>
      <div class="text-center">
        <span class="font-serif italic text-2xl tracking-wide">doki doki</span>
        <span class="block text-[9px] tracking-[0.3em] uppercase font-light text-neutral-400 -mt-1">world</span>
      </div>
      <!-- ICONO DE CARRITO CON CONTADOR -->
      <div onclick="toggleCarrito()" class="relative cursor-pointer hover:text-dokiRosa transition flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg>
        <span id="cart-count" class="absolute -top-2 -right-2 bg-dokiRosa text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
      </div>
    </div>
  </nav>

  <!-- CARRITO LATERAL FLOTANTE -->
  <div id="sidebar-carrito" class="fixed top-0 right-0 h-full w-full sm:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col border-l border-neutral-100">
    <div class="p-6 border-b border-neutral-100 flex items-center justify-between">
      <div>
        <h3 class="font-serif italic text-lg text-dokiDark">Tu Carrito</h3>
        <p class="text-[9px] tracking-widest uppercase text-neutral-400">Doki Doki World</p>
      </div>
      <button onclick="toggleCarrito()" class="text-xs uppercase tracking-widest text-neutral-400 hover:text-dokiDark">Cerrar ✕</button>
    </div>
    <div id="carrito-items" class="flex-grow overflow-y-auto p-6 space-y-4 divide-y divide-neutral-50">
      <p class="text-xs font-light text-neutral-400 text-center py-12">Tu carrito está vacío.</p>
    </div>
    <div class="p-6 border-t border-neutral-100 bg-neutral-50/50 space-y-4">
      <div class="flex items-center justify-between text-xs tracking-wide uppercase">
        <span class="font-light text-neutral-500">Subtotal:</span>
        <span id="carrito-total" class="font-semibold text-dokiDark">$ 0.00 MXN</span>
      </div>
      <button onclick="window.location.href='checkout.html'" class="w-full bg-dokiDark text-white py-3 rounded-full text-xs font-medium uppercase tracking-widest hover:bg-dokiRosa transition shadow-sm">Proceder al Pago</button>
    </div>
  </div>
  <div id="cart-overlay" onclick="toggleCarrito()" class="fixed top-0 left-0 w-full h-full bg-black/20 backdrop-blur-[1px] z-40 hidden"></div>

  <!-- SECCIÓN DE DETALLES -->
  <main class="flex-grow max-w-5xl mx-auto px-6 py-12 w-full">
    <div id="loading-view" class="text-center py-20 uppercase text-xs tracking-widest text-neutral-400">Cargando detalles del álbum...</div>
    
    <div id="producto-view" class="grid grid-cols-1 md:grid-cols-2 gap-12 hidden">
      <div class="relative aspect-square w-full overflow-hidden bg-neutral-100 rounded-3xl shadow-sm">
        <img id="det-imagen" src="" class="w-full h-full object-cover">
        <span id="det-etiqueta" class="absolute top-4 left-4 backdrop-blur-sm text-[9px] font-medium tracking-widest uppercase px-3 py-1 rounded-full shadow-sm hidden"></span>
      </div>
      
      <div class="flex flex-col justify-center space-y-6">
        <div>
          <p id="det-artista" class="text-xs tracking-widest uppercase font-light text-neutral-400 mb-1"></p>
          <h1 id="det-titulo" class="font-serif italic text-3xl md:text-4xl tracking-wide text-dokiDark"></h1>
        </div>
        
        <div class="border-b pb-4 border-neutral-100">
          <p id="det-precio" class="text-xl font-medium tracking-wide text-neutral-800"></p>
          <div id="det-stock-status" class="text-xs font-medium tracking-wider uppercase mt-2"></div>
        </div>
        
        <div class="space-y-2">
          <h4 class="text-[10px] tracking-widest uppercase font-semibold text-neutral-400">Información del Artículo</h4>
          <p id="det-descripcion" class="text-sm font-light leading-relaxed text-neutral-600 whitespace-pre-line"></p>
        </div>

        <!-- CONTENEDOR SELECTOR DE CANTIDAD (Estilo Minimalista) -->
        <div id="contenedor-cantidad" class="space-y-2 pt-2">
          <label class="block text-[10px] tracking-widest uppercase font-semibold text-neutral-400">Cantidad</label>
          <div class="flex items-center border border-neutral-200 rounded-xl w-32 overflow-hidden bg-neutral-50/50">
            <button onclick="cambiarCantidadLocal(-1)" class="w-10 h-10 text-xs hover:bg-neutral-100 transition select-none font-medium">─</button>
            <input type="number" id="input-cantidad" value="1" min="1" class="w-12 h-10 text-center text-xs bg-transparent focus:outline-none font-medium [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
            <button onclick="cambiarCantidadLocal(1)" class="w-10 h-10 text-xs hover:bg-neutral-100 transition select-none font-medium">＋</button>
          </div>
        </div>

        <button id="btn-accion" onclick="agregarAlCarritoAccion()" class="w-full bg-dokiDark text-white py-3 rounded-full text-xs font-medium uppercase tracking-widest hover:bg-dokiRosa transition-all duration-300 shadow-sm mt-4">Añadir al Carrito</button>
      </div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://zjplkxjcbkqdnepzdwqf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqcGxreGpjYmtxZG5lcHpkd3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTc0NTgsImV4cCI6MjA5Nzk3MzQ1OH0.fB1GNgt3qkzmar8lKjeHU3S4s6hOwNM_BL_qw4LHNzE';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let productoActual = null;
    let maxStockDisponible = 1;

    async function cargarDetalleProducto() {
      const urlParams = new URLSearchParams(window.location.search);
      const prodId = urlParams.get('id');
      if(!prodId) { window.location.href = 'index.html'; return; }

      const { data: prod, error } = await supabaseClient.from('productos').select('*').eq('id', prodId).single();
      if(error || !prod) { document.getElementById('loading-view').innerText = 'El producto no existe.'; return; }

      productoActual = prod;
      maxStockDisponible = prod.stock !== undefined && prod.stock !== null ? prod.stock : 1;

      document.getElementById('det-imagen').src = prod.imagen;
      document.getElementById('det-artista').innerText = prod.artista || 'K-POP';
      document.getElementById('det-titulo').innerText = prod.titulo;
      document.getElementById('det-precio').innerText = `$ ${Number(prod.precio || 0).toLocaleString('es-MX', {minimumFractionDigits: 2})} MXN`;
      document.getElementById('det-descripcion').innerText = prod.descripcion || 'No hay descripción disponible.';

      const stockStatus = document.getElementById('det-stock-status');
      const btnAccion = document.getElementById('btn-accion');
      const contenedorCantidad = document.getElementById('contenedor-cantidad');

      if (maxStockDisponible <= 0) {
        stockStatus.innerText = "❌ Fuera de Stock / Agotado";
        stockStatus.className = "text-xs font-medium tracking-wider uppercase mt-2 text-red-500";
        btnAccion.innerText = "Agotado Temporalmente";
        btnAccion.disabled = true;
        btnAccion.className = "w-full bg-neutral-200 text-neutral-400 py-3 rounded-full text-xs font-medium uppercase tracking-widest cursor-not-allowed mt-4 shadow-sm";
        contenedorCantidad.classList.add('hidden'); // Ocultar controles si no hay stock
      } else {
        stockStatus.innerText = `✨ ¡Disponibles: ${maxStockDisponible} piezas!`;
        stockStatus.className = "text-xs font-medium tracking-wider uppercase mt-2 text-emerald-600";
      }

      if(prod.etiqueta) {
        const tag = document.getElementById('det-etiqueta');
        tag.innerText = prod.etiqueta; tag.classList.remove('hidden');
        if(prod.etiqueta.toLowerCase() === 'sale') { tag.classList.add('bg-dokiRosa', 'text-white'); } 
        else { tag.classList.add('bg-white/90', 'text-dokiLila'); }
      }

      document.getElementById('loading-view').classList.add('hidden');
      document.getElementById('producto-view').classList.remove('hidden');
    }

    // CONTROL DE CANTIDAD EN LA VISTA
    function cambiarCantidadLocal(valor) {
      const input = document.getElementById('input-cantidad');
      let actual = parseInt(input.value) || 1;
      actual += valor;
      
      if (actual < 1) actual = 1;
      if (actual > maxStockDisponible) {
        actual = maxStockDisponible;
        alert(`Lo sentimos, solo contamos con ${maxStockDisponible} piezas disponibles en inventario.`);
      }
      
      input.value = actual;
    }

    // MANEJO CARRITO CON CANTIDAD VARIADA
    function agregarAlCarritoAccion() {
      if(!productoActual) return;
      const input = document.getElementById('input-cantidad');
      const cantidadASeleccionar = parseInt(input.value) || 1;

      let cart = JSON.parse(localStorage.getItem('doki_cart')) || [];
      const itemExistente = cart.find(item => item.id === productoActual.id);

      if(itemExistente) {
        const nuevaCantidadTotal = itemExistente.cantidad + cantidadASeleccionar;
        if (nuevaCantidadTotal > maxStockDisponible) {
          alert(`No puedes añadir más. Ya tienes ${itemExistente.cantidad} piezas en tu carrito y el stock máximo es de ${maxStockDisponible}.`);
          return;
        }
        itemExistente.cantidad = nuevaCantidadTotal;
      } else {
        cart.push({
          id: productoActual.id,
          titulo: productoActual.titulo,
          precio: productoActual.precio,
          imagen: productoActual.imagen,
          cantidad: cantidadASeleccionar
        });
      }

      localStorage.setItem('doki_cart', JSON.stringify(cart));
      input.value = 1; // Resetear el contador a 1 después de añadir
      toggleCarrito();
    }

    function toggleCarrito() {
      const sidebar = document.getElementById('sidebar-carrito');
      const overlay = document.getElementById('cart-overlay');
      sidebar.classList.toggle('translate-x-full');
      overlay.classList.toggle('hidden');
      if (!sidebar.classList.contains('translate-x-full')) { renderizarCarrito(); }
    }

    function renderizarCarrito() {
      const cart = JSON.parse(localStorage.getItem('doki_cart')) || [];
      const contenedor = document.getElementById('carrito-items');
      const totalText = document.getElementById('carrito-total');
      const countBadge = document.getElementById('cart-count');

      const totalItems = cart.reduce((acc, item) => acc + item.cantidad, 0);
      if(totalItems > 0) { countBadge.innerText = totalItems; countBadge.classList.remove('hidden'); }
      else { countBadge.classList.add('hidden'); }

      if(cart.length === 0) {
        contenedor.innerHTML = '<p class="text-xs font-light text-neutral-400 text-center py-12">Tu carrito está vacío.</p>';
        totalText.innerText = "$ 0.00 MXN";
        return;
      }

      contenedor.innerHTML = '';
      let subtotal = 0;
      cart.forEach((item, index) => {
        subtotal += item.precio * item.cantidad;
        contenedor.innerHTML += `
          <div class="flex items-center space-x-4 pt-4 first:pt-0">
            <img src="${item.imagen}" class="w-14 h-14 object-cover rounded-xl bg-neutral-50 flex-shrink-0">
            <div class="flex-grow min-w-0">
              <h4 class="text-xs font-medium text-neutral-800 truncate">${item.titulo}</h4>
              <p class="text-[10px] text-neutral-400 mt-0.5">$ ${item.precio} MXN x ${item.cantidad}</p>
            </div>
            <button onclick="eliminarDelCarrito(${index})" class="text-[11px] text-neutral-300 hover:text-red-500 transition px-2">✕</button>
          </div>
        `;
      });
      totalText.innerText = `$ ${subtotal.toLocaleString('es-MX', {minimumFractionDigits: 2})} MXN`;
    }

    function eliminarDelCarrito(index) {
      let cart = JSON.parse(localStorage.getItem('doki_cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('doki_cart', JSON.stringify(cart));
      renderizarCarrito();
    }

    cargarDetalleProducto();
    renderizarCarrito();
  </script>
</body>
</html>
