<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doki Doki World | K-Pop Album Shop</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=200;300;400;500&family=Playfair+Display:ital,wght=0,400;1,400&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dokiBackground: '#FBF9FC',
            dokiDark: '#111111',
            dokiRosa: '#E55B92',
            dokiLila: '#934B8B',
          },
          fontFamily: {
            sans: ['Montserrat', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-dokiBackground text-dokiDark antialiased">

  <nav class="w-full bg-dokiBackground/80 backdrop-blur-md sticky top-0 z-50 border-b border-neutral-100">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="hidden md:flex space-x-8 text-xs tracking-widest uppercase font-light">
        <a href="#" class="hover:text-dokiRosa transition-colors duration-300">Inicio</a>
        <a href="#" class="hover:text-dokiRosa transition-colors duration-300">Preventas</a>
        <a href="#" class="hover:text-dokiRosa transition-colors duration-300">Categorías</a>
      </div>
      <div class="text-center">
        <span class="font-serif italic text-2xl tracking-wide">doki doki</span>
        <span class="block text-[9px] tracking-[0.3em] uppercase font-light text-neutral-400 -mt-1">world</span>
      </div>
      <div class="flex items-center space-x-6 text-sm font-light">
        <a href="#" class="hover:text-dokiRosa transition-colors duration-300 tracking-widest text-xs uppercase hidden md:inline-block">Buscar</a>
        <div class="relative cursor-pointer hover:text-dokiRosa transition-colors duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg>
        </div>
      </div>
    </div>
  </nav>

  <section id="hero-container" class="relative w-full h-[70vh] flex items-center justify-center overflow-hidden bg-black">
    <div id="video-wrapper" class="absolute top-0 left-0 w-full h-full z-0 pointer-events-none flex items-center justify-center"></div>
    <div class="absolute top-0 left-0 w-full h-full bg-dokiDark/40 backdrop-blur-[1px] z-10 pointer-events-none"></div>
    <div class="relative z-20 text-center text-white px-4 max-w-2xl pointer-events-auto">
      <h1 class="font-serif italic text-4xl md:text-6xl tracking-wide mb-3">Doki Doki World</h1>
      <p class="text-xs md:text-sm tracking-[0.2em] uppercase font-light text-neutral-200 mb-8">Tu tienda mexicana de K-Pop · De fans para fans</p>
      <a href="#" class="inline-block px-8 py-3 rounded-full border border-white text-white uppercase text-[10px] tracking-widest font-medium bg-transparent hover:bg-white hover:text-dokiDark transition-all duration-300">Ver Preventas Especiales</a>
    </div>
  </section>

  <section class="max-w-7xl mx-auto px-6 py-20">
    <div class="flex items-end justify-between mb-12">
      <div>
        <span class="text-[10px] tracking-[0.3em] uppercase font-light text-neutral-400 block mb-2">Próximos Lanzamientos</span>
        <h2 class="font-serif italic text-3xl tracking-wide">Preventas Especiales</h2>
      </div>
    </div>
    <div id="grid-productos" class="grid grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-12">
      <p class="text-xs font-light text-neutral-400 col-span-full text-center py-10 tracking-widest uppercase">Cargando catálogo...</p>
    </div>
  </section>

  <script>
    const SUPABASE_URL = 'https://zjplkxjcbkqdnepzdwqf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqcGxreGpjYmtxZG5lcHpkd3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTc0NTgsImV4cCI6MjA5Nzk3MzQ1OH0.fB1GNgt3qkzmar8lKjeHU3S4s6hOwNM_BL_qw4LHNzE';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function cargarVideoHero() {
      const { data: config } = await supabaseClient.from('configuracion').select('valor').eq('clave', 'video_hero').single();
      const wrapper = document.getElementById('video-wrapper');
      let videoUrl = 'https://assets.mixkit.co/videos/preview/mixkit-abstract-laser-lights-background-41857-large.mp4'; 
      if (config && config.valor) { videoUrl = config.valor; }

      wrapper.innerHTML = `
        <video autoplay loop muted playsinline class="w-full h-full object-cover pointer-events-none" style="min-height: 70vh; width: 100vw; object-fit: cover;">
          <source src="${videoUrl}" type="video/mp4" />
        </video>
      `;
    }

    async function cargarProductos() {
      const grid = document.getElementById('grid-productos');
      // CAMBIADO A MINÚSCULA "productos"
      const { data: productos, error } = await supabaseClient.from('productos').select('*').order('id', { ascending: true });

      if (error) {
        console.error(error);
        grid.innerHTML = `<p class="text-xs font-light text-dokiRosa col-span-full text-center py-10 tracking-widest uppercase">Error al conectar con el inventario.</p>`;
        return;
      }

      grid.innerHTML = ''; 
      if (!productos || productos.length === 0) {
        grid.innerHTML = `<p class="text-xs font-light text-neutral-400 col-span-full text-center py-10 tracking-widest uppercase">No hay productos registrados.</p>`;
        return;
      }

      productos.forEach(prod => {
        const tieneEtiqueta = prod.etiqueta ? true : false;
        const esSale = prod.etiqueta?.toLowerCase() === 'sale';
        const colorEtiqueta = esSale ? 'bg-dokiRosa text-white' : 'bg-white/90 text-dokiLila border border-neutral-100';

        grid.innerHTML += `
          <div class="group cursor-pointer">
            <div class="relative aspect-square w-full overflow-hidden bg-neutral-100 rounded-2xl mb-4 shadow-sm group-hover:shadow-md transition-all duration-300">
              <img src="${prod.imagen}" alt="${prod.titulo}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=600&q=80'"/>
              ${tieneEtiqueta ? `<span class="absolute top-3 left-3 backdrop-blur-sm text-[9px] font-medium tracking-widest uppercase px-3 py-1 rounded-full shadow-sm ${colorEtiqueta}">${prod.etiqueta}</span>` : ''}
            </div>
            <div class="space-y-1 px-1">
              <p class="text-[10px] tracking-widest uppercase font-light text-neutral-400">${prod.artista || 'K-POP'}</p>
              <h3 class="text-sm font-light tracking-wide text-dokiDark group-hover:text-dokiRosa transition-colors duration-300 truncate">${prod.titulo}</h3>
              <p class="text-xs font-medium tracking-wide mt-1 text-neutral-600">$ ${Number(prod.precio || 0).toLocaleString('es-MX', {minimumFractionDigits: 2})} MXN</p>
            </div>
          </div>
        `;
      });
    }

    cargarVideoHero();
    cargarProductos();
  </script>
</body>
</html>
