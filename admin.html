<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doki Doki | Panel de Administración</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dokiBackground: '#FBF9FC', dokiDark: '#111111', dokiRosa: '#E55B92', dokiLila: '#934B8B' },
          fontFamily: { sans: ['Montserrat', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-dokiBackground text-dokiDark antialiased p-6 md:p-12">

  <div class="max-w-7xl mx-auto flex justify-between items-center mb-8">
    <h1 class="text-2xl font-bold tracking-tight">Panel de Administración ✨</h1>
    <button onclick="cerrarSesionAdmin()" class="bg-neutral-200 hover:bg-neutral-300 text-neutral-700 px-4 py-2 rounded-xl text-xs font-medium transition">Cerrar Sesión</button>
  </div>

  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-4 space-y-6">
      
      <div class="bg-white p-6 rounded-3xl border border-neutral-100 shadow-sm space-y-4">
        <h3 class="text-xs font-bold uppercase tracking-wider text-neutral-400">Video de Fondo</h3>
        <div class="space-y-2">
          <input type="file" id="video-file" class="w-full text-xs text-neutral-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-medium file:bg-neutral-100 file:text-neutral-700 hover:file:bg-neutral-200">
          <button onclick="subirVideoHero()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-xl text-xs font-medium transition pt-3">Subir Video</button>
        </div>
      </div>

      <div class="bg-white p-6 rounded-3xl border border-neutral-100 shadow-sm space-y-4">
        <h3 class="text-xs font-bold uppercase tracking-wider text-neutral-400">Gestionar Categorías</h3>
        <form onsubmit="crearCategoria(event)" class="flex space-x-2">
          <input type="text" id="nueva-cat-nombre" required placeholder="Nueva categoría (ej. aespa)" class="flex-grow p-2 border rounded-xl text-xs bg-neutral-50/50 focus:outline-none focus:border-dokiRosa">
          <button type="submit" class="bg-dokiDark text-white px-3 py-2 rounded-xl text-xs font-medium hover:bg-dokiRosa transition">＋</button>
        </form>
        <div id="lista-categorias-admin" class="flex flex-wrap gap-1.5 max-h-32 overflow-y-auto pt-2">
          </div>
      </div>

      <div class="bg-white p-6 rounded-3xl border border-neutral-100 shadow-sm space-y-4">
        <h3 id="form-titulo" class="text-xs font-bold uppercase tracking-wider text-neutral-400">Añadir Artículo</h3>
        <form id="form-articulo" onsubmit="guardarArticulo(event)" class="space-y-3">
          <input type="hidden" id="prod-id">
          
          <input type="text" id="prod-titulo" required placeholder="Título del álbum" class="w-full p-2.5 border rounded-xl text-xs bg-neutral-50/50 focus:outline-none focus:border-dokiRosa">
          <input type="text" id="prod-artista" required placeholder="Artista / Grupo" class="w-full p-2.5 border rounded-xl text-xs bg-neutral-50/50 focus:outline-none focus:border-dokiRosa">
          
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[9px] font-bold text-neutral-400 uppercase mb-1">Precio (MXN):</label>
              <input type="number" id="prod-precio" required placeholder="700" class="w-full p-2.5 border rounded-xl text-xs bg-neutral-50/50 focus:outline-none focus:border-dokiRosa">
            </div>
            <div>
              <label class="block text-[9px] font-bold text-neutral-400 uppercase mb-1">Cantidad Stock:</label>
              <input type="number" id="prod-stock" required placeholder="1" class="w-full p-2.5 border rounded-xl text-xs bg-neutral-50/50 focus:outline-none focus:border-dokiRosa">
            </div>
          </div>

          <div>
            <label class="block text-[9px] font-bold text-neutral-400 uppercase mb-1">Categoría / Grupo:</label>
            <select id="prod-categoria" class="w-full p-2.5 border rounded-xl text-xs bg-neutral-50/50 focus:outline-none focus:border-dokiRosa">
              </select>
          </div>

          <div>
            <label class="block text-[9px] font-bold text-neutral-400 uppercase mb-1">Sección de la Tienda:</label>
            <select id="prod-tipo-seccion" required class="w-full p-2.5 border rounded-xl text-xs bg-neutral-50/50 focus:outline-none focus:border-dokiRosa">
              <option value="Productos en Stock">Productos en Stock</option>
              <option value="Preventas">Preventas Especiales</option>
              <option value="Autografiados">Álbumes Autografiados</option>
            </select>
          </div>

          <input type="text" id="prod-etiqueta" placeholder="Etiqueta (Pre-Order, Sale, etc.) o vacío" class="w-full p-2.5 border rounded-xl text-xs bg-neutral-50/50 focus:outline-none focus:border-dokiRosa">
          <textarea id="prod-descripcion" rows="3" placeholder="Descripción del producto..." class="w-full p-2.5 border rounded-xl text-xs bg-neutral-50/50 focus:outline-none focus:border-dokiRosa"></textarea>
          
          <div class="space-y-1">
            <label class="block text-[10px] text-neutral-400 font-medium">Imagen de portada (Opcional si estás editando):</label>
            <input type="file" id="prod-img-file" class="w-full text-xs text-neutral-500 file:mr-4 file:py-2 file:px-3 file:rounded-xl file:border-0 file:text-[11px] file:bg-neutral-100 hover:file:bg-neutral-200">
          </div>

          <button type="submit" id="btn-submit-prod" class="w-full bg-dokiDark text-white py-3 rounded-full text-xs font-medium uppercase tracking-widest hover:bg-dokiRosa transition pt-3">Guardar Artículo</button>
        </form>
      </div>

    </div>

    <div class="lg:col-span-8">
      <div class="bg-white p-8 rounded-3xl border border-neutral-100 shadow-sm min-h-[70vh] space-y-6">
        <h3 class="text-xs font-bold uppercase tracking-wider text-neutral-400">Inventario Actual</h3>
        
        <div id="lista-inventario" class="space-y-4 divide-y divide-neutral-50">
          <p class="text-xs text-neutral-400 py-6 text-center">Cargando almacén...</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://zjplkxjcbkxdnepzdwqf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqcGxreGpjYmtxZG5lcHpkd3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTc0NTgsImV4cCI6MjA5Nzk3MzQ1OH0.fB1GNgt3qkzmar8lKjeHU3S4s6hOwNM_BL_qw4LHNzE';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let editandoImagenUrl = "";

    async function inicializarPanel() {
      await cargarCategorias();
      await cargarInventario();
    }

    // --- LÓGICA DE CATEGORÍAS ---
    async function cargarCategorias() {
      const { data: cats } = await supabaseClient.from('categorias').select('*').order('nombre', { ascending: true });
      const selectForm = document.getElementById('prod-categoria');
      const contenedorLista = document.getElementById('lista-categorias-admin');

      selectForm.innerHTML = '<option value="">Selecciona un grupo...</option>';
      contenedorLista.innerHTML = '';

      if (cats) {
        cats.forEach(c => {
          selectForm.innerHTML += `<option value="${c.nombre}">${c.nombre}</option>`;
          contenedorLista.innerHTML += `
            <span class="inline-flex items-center bg-neutral-100 text-[10px] font-medium text-neutral-700 px-2.5 py-1 rounded-full">
              ${c.nombre}
              <button onclick="eliminarCategoria(${c.id})" class="ml-1.5 text-neutral-400 hover:text-red-500 font-bold">✕</button>
            </span>
          `;
        });
      }
    }

    async function crearCategoria(e) {
      e.preventDefault();
      const input = document.getElementById('nueva-cat-nombre');
      const nombre = input.value.trim();

      const { error } = await supabaseClient.from('categorias').insert([{ nombre }]);
      if (error) alert("Error o categoría ya existente: " + error.message);
      
      input.value = '';
      await cargarCategorias();
    }

    async function eliminarCategoria(id) {
      if(!confirm("¿Segura que deseas eliminar esta categoría?")) return;
      await supabaseClient.from('categorias').delete().eq('id', id);
      await cargarCategorias();
    }

    // --- LÓGICA DE PRODUCTOS ---
    async function cargarInventario() {
      const contenedor = document.getElementById('lista-inventario');
      const { data: prods, error } = await supabaseClient.from('productos').select('*').order('id', { ascending: false });

      if(error || !prods || prods.length === 0) {
        contenedor.innerHTML = '<p class="text-xs text-neutral-400 py-6 text-center">No hay productos en catálogo.</p>';
        return;
      }

      contenedor.innerHTML = '';
      prods.forEach(p => {
        contenedor.innerHTML += `
          <div class="flex items-center justify-between pt-4 first:pt-0">
            <div class="flex items-center space-x-4">
              <img src="${p.imagen}" class="w-12 h-12 object-cover rounded-xl bg-neutral-100" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600'">
              <div>
                <h4 class="text-xs font-semibold text-neutral-800">${p.titulo}</h4>
                <p class="text-[10px] text-neutral-400 mt-0.5">${p.artista || 'K-Pop'} · <span class="text-dokiRosa font-medium">${p.categoria || 'Sin grupo'}</span> · <span class="bg-neutral-100 px-1.5 py-0.5 rounded text-[9px] font-semibold">${p.tipo_seccion || 'Stock'}</span></p>
                <p class="text-[10px] font-bold text-neutral-600 mt-0.5">$ ${p.precio} MXN <span class="font-normal text-neutral-400 ml-2">Stock: ${p.stock || 0}</span></p>
              </div>
            </div>
            <div class="flex space-x-1.5">
              <button onclick="prepararEdicion(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="bg-neutral-100 hover:bg-neutral-200 text-neutral-700 px-3 py-1.5 rounded-lg text-[10px] font-medium transition">Editar</button>
              <button onclick="eliminarProducto(${p.id})" class="bg-red-50 hover:bg-red-100 text-red-500 px-3 py-1.5 rounded-lg text-[10px] font-medium transition">Eliminar</button>
            </div>
          </div>
        `;
      });
    }

    async function guardarArticulo(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-submit-prod');
      btn.disabled = true; btn.innerText = "PROCESANDO...";

      const id = document.getElementById('prod-id').value;
      const fileInput = document.getElementById('prod-img-file');
      const catValue = document.getElementById('prod-categoria').value;
      
      let finalImageUrl = editandoImagenUrl;

      // Subir archivo al bucket público "imagenes" si se seleccionó uno
      if(fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}-${Math.random().toString(36).substr(2, 9)}.${fileExt}`;
        
        const { data, error: uploadError } = await supabaseClient.storage.from('imagenes').upload(fileName, file);
        
        if(!uploadError) {
          const { data: urlData } = supabaseClient.storage.from('imagenes').getPublicUrl(fileName);
          if (urlData && urlData.publicUrl) {
            finalImageUrl = urlData.publicUrl;
          }
        } else {
          console.error("Error al subir archivo a Storage:", uploadError);
        }
      }

      // Placeholder estético en caso de estar vacío
      if(!finalImageUrl) {
        finalImageUrl = 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600';
      }

      // Estructurar el payload limpiamente
      const payload = {
        titulo: document.getElementById('prod-titulo').value,
        artista: document.getElementById('prod-artista').value,
        precio: parseFloat(document.getElementById('prod-precio').value),
        stock: parseInt(document.getElementById('prod-stock').value),
        tipo_seccion: document.getElementById('prod-tipo-seccion').value,
        etiqueta: document.getElementById('prod-etiqueta').value,
        descripcion: document.getElementById('prod-descripcion').value,
        imagen: finalImageUrl
      };

      // SOLO añadir la propiedad categoría si el usuario seleccionó una real de la lista
      if (catValue && catValue !== "") {
        payload.categoria = catValue;
      } else {
        payload.categoria = null; // Fuerza el valor nulo limpio aceptado por la base de datos
      }

      let error;
      if(id) {
        const res = await supabaseClient.from('productos').update(payload).eq('id', id);
        error = res.error;
      } else {
        const res = await supabaseClient.from('productos').insert([payload]);
        error = res.error;
      }

      if (error) {
        alert("Error al guardar en la base de datos: " + error.message);
      } else {
        document.getElementById('form-articulo').reset();
        document.getElementById('prod-id').value = '';
        document.getElementById('form-titulo').innerText = "Añadir Artículo";
        editandoImagenUrl = "";
      }
      
      btn.disabled = false; btn.innerText = "Guardar Artículo";
      await cargarInventario();
    }

    function prepararEdicion(p) {
      document.getElementById('form-titulo').innerText = "Editar Artículo";
      document.getElementById('prod-id').value = p.id;
      document.getElementById('prod-titulo').value = p.titulo;
      document.getElementById('prod-artista').value = p.artista;
      document.getElementById('prod-precio').value = p.precio;
      document.getElementById('prod-stock').value = p.stock || 0;
      document.getElementById('prod-categoria').value = p.categoria || '';
      document.getElementById('prod-tipo-seccion').value = p.tipo_seccion || 'Productos en Stock';
      document.getElementById('prod-etiqueta').value = p.etiqueta || '';
      document.getElementById('prod-descripcion').value = p.descripcion || '';
      editandoImagenUrl = p.imagen;
      
      document.getElementById('form-titulo').scrollIntoView({ behavior: 'smooth' });
    }

    async function eliminarProducto(id) {
      if(!confirm("¿Deseas dar de baja este producto del catálogo?")) return;
      await supabaseClient.from('productos').delete().eq('id', id);
      await cargarInventario();
    }

    function cerrarSesionAdmin() {
      window.location.href = 'index.html';
    }

    inicializarPanel();
  </script>
</body>
</html>
